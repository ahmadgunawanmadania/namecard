<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><?= mode === "profile" ? pegawai.Nama_Lengkap : "Direktori Pegawai Madania" ?></title>

<script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0b132b,#1e3a8a);
  color:white;
}

body.light{
  background:linear-gradient(135deg,#eaeef5,#d8e1f0);
  color:#0b132b;
}

.card{
  width:95%;
  max-width:520px;
  border-radius:24px;
  overflow:hidden;
  background:rgba(15, 23, 42, 0.95);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  text-align:center;
}

body.light .card{
  background:white;
  border:1px solid #ccc;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* HEADER */
.header{
  padding:30px 25px 10px 25px;
}

.logo-top{
  width:100%;
  max-width:260px;
  height:auto;
  margin:0 auto 15px auto;
  display:block;
}

.profile-photo{
  width:110px;
  height:110px;
  border-radius:50%;
  object-fit:cover;
  object-position:top;
  border:4px solid white;
  margin:15px auto;
  display:block;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

body.light .profile-photo{
  border:4px solid #0b132b;
}

/* CONTENT */
.content{
  padding:20px 30px 35px 30px;
}

h1{
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}

.title{
  font-size:14px;
  line-height:1.6;
  margin-bottom:18px;
}

.info{
  font-size:14px;
  margin:6px 0;
}

/* Buttons */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-weight:600;
  cursor:pointer;
  transition: background 0.3s ease, transform 0.1s ease;
}

.btn-save{
  background:white;
  color:#0b132b;
}

body.light .btn-save{
  background:#0b132b;
  color:white;
}

.btn-wa{
  background:#25D366;
  color:white;
}

.btn-share{
  background:#444;
  color:white;
}

.btn-toggle{
  background:#888;
  color:white;
}

button:active {
  transform: scale(0.98);
}

/* QR */
.qr-wrapper{
  margin-top:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
  border-radius:20px;
  background:white;
}

/* CSS KHUSUS INPUT ID */
.search-container {
  padding: 30px;
}

.id-input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 16px;
  text-align: center;
  margin-bottom: 15px;
  transition: border 0.3s ease;
}

body.light .id-input {
  background: #f8f9fa;
  color: #0b132b;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="card">

  <? if (mode === "list") { ?>
    <!-- TAMPILAN INPUT ID -->
    <div class="header">
        <img src="https://i.ibb.co.com/fYhbdXW0/Madania-Landscape-Putih.png" id="main-logo" class="logo-top">
        <h2 style="margin-bottom:15px;">Cari Profil Pegawai</h2>
    </div>

    <? if (typeof error !== 'undefined' && error) { ?>
      <div style="background:rgba(255,0,0,0.2); padding:10px; margin:0 30px; border-radius:8px; font-size:13px;"><?= error ?></div>
    <? } ?>

    <form action="<?= appBaseUrl ?>" method="get" target="_self" class="search-container">
       <input type="number" name="id" class="id-input" placeholder="Masukkan ID Pegawai (Contoh: 101)" required>
       <button type="submit" class="btn-save" style="background:#1e3a8a; color:white;">Lihat Profil</button>
       <button type="button" class="btn-toggle" onclick="toggleMode()">Ganti Tema</button>
    </form>

  <? } else { ?>
    <!-- TAMPILAN KARTU NAMA (PROFILE) -->
    <div class="header">
        <img src="https://i.ibb.co.com/fYhbdXW0/Madania-Landscape-Putih.png" id="main-logo" class="logo-top">
        <img src="<?= pegawai.URL_Foto ?>" class="profile-photo">
    </div>

    <div class="content">
        <h1><?= pegawai.Nama_Lengkap ?></h1>
        <div class="title">
          <?= pegawai.Jabatan ?><br>
          <?= pegawai.Unit_Kerja ?>
        </div>

        <div class="info"><strong>Madania School</strong></div>
        <div class="info">📱 <?= pegawai.No_HP ?></div>
        <div class="info">☎ <?= pegawai.Telp_Kantor ?></div>
        <div class="info">✉ <?= pegawai.Email ?></div>
        <div class="info">🌐 <?= pegawai.Website ?></div>

        <button class="btn-save" onclick="downloadVCF()">Simpan Kontak</button>
        <button class="btn-wa" onclick="openWA()">Chat WhatsApp</button>
        <button class="btn-share" onclick="shareCard()">Share Kartu</button>
        <button class="btn-toggle" onclick="toggleMode()">Ganti Tema</button>

        <div class="qr-wrapper">
            <div id="qrcode"></div>
        </div>
    </div>
  <? } ?>

</div>

<script>
<? if (mode === "profile") { ?>
const pegawai = <?!= JSON.stringify(pegawai) ?>;
const appUrl = "<?!= appUrl ?>";

const vcardData = `BEGIN:VCARD
VERSION:3.0
FN:${pegawai.Nama_Lengkap}
ORG:${pegawai.Unit_Kerja}
TITLE:${pegawai.Jabatan}
TEL;TYPE=CELL:${pegawai.No_HP}
TEL;TYPE=WORK:${pegawai.Telp_Kantor}
EMAIL:${pegawai.Email}
URL:https://${pegawai.Website}
END:VCARD`;

function downloadVCF() {
  const blob = new Blob([vcardData], { type: "text/vcard" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `${pegawai.Nama_Lengkap}.vcf`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function openWA() {
  let phone = String(pegawai.No_HP).replace(/\D/g, '');
  if (phone.startsWith('0')) phone = '62' + phone.slice(1);
  window.open("https://wa.me/" + phone, "_blank");
}

function shareCard() {
  const shareText = `Profil ${pegawai.Nama_Lengkap}\n${pegawai.Jabatan}\n\nCek kartu nama digital di sini:`;
  const waUrl = `https://wa.me/?text=${encodeURIComponent(shareText + "\n" + appUrl)}`;

  if (navigator.share && !window.frameElement) {
    navigator.share({
      title: "Profil " + pegawai.Nama_Lengkap,
      text: shareText,
      url: appUrl
    }).catch(() => window.open(waUrl, "_blank"));
  } else {
    // Langsung ke WhatsApp jika di dalam iframe (Google Sites)
    window.open(waUrl, "_blank");
  }
}

window.onload = function() {
  const qrElem = document.getElementById("qrcode");
  if (qrElem) {
    qrElem.innerHTML = "";
    new QRCode(qrElem, {
      text: appUrl,
      width: 200,
      height: 200,
      colorDark : "#000000",
      colorLight : "#ffffff"
    });
  }
};
<? } ?>

function toggleMode() {
  const isLight = document.body.classList.toggle("light");
  const logo = document.getElementById("main-logo");
  logo.src = isLight 
    ? "https://i.ibb.co.com/B5kJ1P5c/Madania-Landscape-Biru.png" 
    : "https://i.ibb.co.com/fYhbdXW0/Madania-Landscape-Putih.png";
}
</script>

</body>
</html>
